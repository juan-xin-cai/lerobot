robot:
  type: capture_rig
  id: wrist_fisheye_rig
  cameras:
    wrist_fisheye:
      type: opencv
      index_or_path: /dev/video1
      width: 1920
      height: 1536
      fps: 30
      fourcc: UYVY

teleop:
  type: composite
  id: glove_tracker
  devices:
    glove:
      type: udp_glove
      id: udhand_udp
      host: 0.0.0.0
      port: 7777
      timeout_s: 0.2
      wait_for_first_sample: true
      log_raw_udp_until_first_sample: true
      raw_udp_log_interval_s: 1.0
    tracker:
      type: steamvr_tracker
      id: wrist_tracker_tcp
      host: 0.0.0.0
      port: 8765
      expected_hz: 120
      timeout_s: 0.05
      wait_for_connection: true
      wait_for_first_sample: true
      log_raw_tcp_until_first_sample: true
      raw_tcp_log_interval_s: 1.0

dataset:
  repo_id: local/embodiment_free_p0
  root: data/embodiment_free_p0
  fps: 30
  num_episodes: 1
  episode_time_s: 30
  reset_time_s: 1
  single_task: wrist fisheye + udp glove + steamvr tracker capture
  push_to_hub: false
  video: true
  vcodec: h264

display_data: false
display_compressed_images: true
play_sounds: false
