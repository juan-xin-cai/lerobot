robot:
  type: capture_rig
  id: wrist_fisheye_rig
  cameras:
    wrist_fisheye:
      type: opencv
      index_or_path: /dev/video0
      width: 1920
      height: 1536
      fps: 30
      fourcc: UYVY

teleop:
  type: steamvr_tracker
  id: wrist_tracker_tcp
  host: 0.0.0.0
  port: 8765
  expected_hz: 120
  timeout_s: 0.05
  wait_for_connection: true
  wait_for_first_sample: true
  log_raw_tcp_until_first_sample: true
  raw_tcp_log_interval_s: 1.0

dataset:
  repo_id: local/wrist_fisheye_capture
  root: data/wrist_fisheye_capture
  fps: 30
  num_episodes: 1
  episode_time_s: 30
  reset_time_s: 1
  single_task: wrist fisheye + steamvr tracker tcp capture test
  push_to_hub: false
  video: true
  vcodec: h264

display_data: true
display_compressed_images: true
play_sounds: false
